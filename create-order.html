<body class="font-sans antialiased pb-32">

            <span id="userWalletAddr" class="text-[9px] font-mono text-slate-400">0x000...000</span>
        </div>

    <main class="px-6 max-w-2xl mx-auto w-full">
        
        <div class="flex bg-white/5 p-1 rounded-2xl mb-10 border border-white/5">
            <button id="boostTab" class="flex-1 py-3 rounded-xl font-bold text-sm transition-all tab-active">

        </div>

        <div id="smsSection" class="hidden space-y-6">
            <div class="space-y-4">
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <input type="text" id="smsSearch" placeholder="Search service (WhatsApp, Google...)" class="w-full bg-white/5 border border-white/10 rounded-2xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:border-purple-500">
                    </div>
                    <button id="sortBtn" class="w-12 h-12 glass-card rounded-2xl flex items-center justify-center hover:bg-white/10 transition">

                <div class="flex items-center justify-between">

            <div id="smsGrid" class="space-y-3">

                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-2">Select Platform</label>
                    <select id="boostCategory" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-4 text-sm focus:outline-none focus:border-blue-500 appearance-none">

                    <select id="boostService" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-4 text-sm focus:outline-none focus:border-blue-500 appearance-none">

                <div class="grid grid-cols-1 gap-4">
                    <div class="space-y-2">

                        <input type="url" id="boostLink" placeholder="https://instagram.com/p/..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-4 text-sm focus:outline-none focus:border-blue-500">

                    <div class="grid grid-cols-2 gap-4">

<script type="module">
import { 
    protectPage, 
    db, 
    FOLLOWIZ_CONFIG, 
    HERO_SMS_CONFIG, 
    processSmsOrder, 
    getUserIdHex,
    callHeroSms,
    callSmmWizGet,
    callSmmWizPost,
    SERVICE_MAP,
    getServiceInfo
} from './auth-guard.js';

// 🔥 IMPORTANT (FIXED)
const VERCEL_PROXY_URL = "https://lit-proxy.vercel.app/api/proxy";

let smmServices = [];
let selectedService = null;
let uBalance = 0;
let uId = null;
let NGN_RATE = HERO_SMS_CONFIG.rate; 

protectPage((userData) => {
    uBalance = userData.balance;
    uId = userData.uid;
    document.getElementById('headerBalance').innerText = `₦${uBalance.toLocaleString()}`;
    document.getElementById('userWalletAddr').innerText = userData.walletAddress || 'Generating...';
    initBoostTab();
    initSmsPage();
});

// ===================== BOOST TAB =====================
async function initBoostTab() {
    await updateExchangeRate();
    await fetchSmmServices();
    
    // Set up event listeners for boost order calculation
    setupBoostListeners();
}

function setupBoostListeners() {
    const boostQtyInput = document.getElementById('boostQty');
    const boostServiceSelect = document.getElementById('boostService');
    const boostButton = document.getElementById('placeBoostOrder');
    
    // Service selection change
    boostServiceSelect.addEventListener('change', () => {
        calculateTotal();
    });
    
    // Quantity input - real-time updates
    boostQtyInput.addEventListener('input', () => {
        calculateTotal();
    });
    
    boostQtyInput.addEventListener('change', () => {
        calculateTotal();
    });
    
    boostQtyInput.addEventListener('keyup', () => {
        calculateTotal();
    });

    // Handle boost order button click
    if (boostButton) {
        boostButton.addEventListener('click', (event) => {
            event.preventDefault();
            window.handleBoostOrder();
        });
    }
    
    // Initialize calculation
    calculateTotal();
}

async function updateExchangeRate() {
    try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        if(data.rates?.NGN) NGN_RATE = data.rates.NGN;
    } catch (err) { console.warn("Using fallback rate."); }
}

async function fetchSmmServices() {
    console.log('📋 Fetching Followiz Services...');
    const catSelect = document.getElementById('boostCategory');
    try {
        const response = await callSmmWizGet({ action: "services" });
        console.log('📋 Followiz Services Response:', response);
        smmServices = response;

        const categories = [...new Set(smmServices.map(s => s.category))];
        catSelect.innerHTML = '<option value="">Choose Platform...</option>';

        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            catSelect.appendChild(opt);
        });

    } catch (err) {
        catSelect.innerHTML = '<option value="">API Offline</option>';
    }
}

document.getElementById('boostCategory').onchange = (e) => {
    const servSelect = document.getElementById('boostService');
    const filtered = smmServices.filter(s => s.category === e.target.value);

    servSelect.innerHTML = '<option value="">Select Service...</option>';

    filtered.forEach(s => {
        const rateInNGN = (s.rate * NGN_RATE * FOLLOWIZ_CONFIG.profitMargin).toFixed(2);
        const opt = document.createElement('option');
        opt.value = s.service || s.service_id || s.id || s.code || '';
        opt.textContent = `${s.name} (₦${rateInNGN}/1k)`;
        servSelect.appendChild(opt);
    });

    calculateTotal();
};

function calculateTotal() {
    const serviceId = String(document.getElementById('boostService').value || '');
    const qtyInput = document.getElementById('boostQty');
    const qty = parseFloat(qtyInput.value) || 0;
    const display = document.getElementById('totalBoostCost');
    const btn = document.getElementById('placeBoostOrder');
    
    if (!display) return; // Safety check
    
    selectedService = smmServices.find(s => {
        const id = String(s.service || s.service_id || s.id || s.code || '');
        return id === serviceId;
    });

    if (selectedService && selectedService.rate >= 0) {
        qtyInput.placeholder = `Min: ${selectedService.min || 0} - Max: ${selectedService.max || 999999}`;
        
        // Calculate price per unit in USD, then convert to NGN
        const usdPricePerUnit = selectedService.rate / 1000;
        const ngnPricePerUnit = usdPricePerUnit * NGN_RATE * FOLLOWIZ_CONFIG.profitMargin;
        const total = qty * ngnPricePerUnit;
        
        // Format and display the total
        const formattedTotal = total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        display.innerText = formattedTotal;

        const isQtyValid = qty >= (parseInt(selectedService.min) || 0) && qty <= (parseInt(selectedService.max) || 999999);
        const canAfford = total <= uBalance;

        // Update display styling based on validation
        if (!isQtyValid && qty > 0) {
            display.classList.add('text-red-500');
            display.classList.remove('text-blue-400');
            display.innerHTML = `<span class="text-[9px]">Limit: ${selectedService.min}-${selectedService.max}</span>`;
            btn.style.opacity = "0.3";
            btn.style.pointerEvents = "none";
        } else if (!canAfford && qty > 0) {
            display.classList.add('text-red-500');
            display.classList.remove('text-blue-400');
            btn.style.opacity = "0.3";
            btn.style.pointerEvents = "none";
        } else {
            display.classList.remove('text-red-500');
            display.classList.add('text-blue-400');
            btn.style.opacity = qty > 0 ? "1" : "0.3";
            btn.style.pointerEvents = qty > 0 ? "auto" : "none";
        }
    } else {
        // No service selected or invalid service
        display.innerText = "0.00";
        display.classList.remove('text-red-500');
        display.classList.add('text-blue-400');
        btn.style.opacity = "0.3";
        btn.style.pointerEvents = "none";
    }
}

// 🔥 FIXED: CAPTURES ORDER ID FOR TRACKING
window.handleBoostOrder = async () => {
    const btn = document.getElementById('placeBoostOrder');
    const qty = document.getElementById('boostQty').value;
    const link = document.getElementById('boostLink').value;
    const cost = parseFloat(document.getElementById('totalBoostCost').innerText.replace(/,/g, ''));

    if (!selectedService || qty < parseInt(selectedService.min)) return alert(`Invalid quantity.`);
    
    btn.disabled = true;
    btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
    btn.style.opacity = "0.5";
    let pollingStarted = false;

    try {
        const serviceId = selectedService.service || selectedService.service_id || selectedService.id || selectedService.code;
        const minQty = parseInt(selectedService.min || 0, 10);
        const maxQty = parseInt(selectedService.max || 999999, 10);

        console.log('🛠️ Order Details:', { serviceId, link, qty, minQty, maxQty, selectedService });

        if (!link || !link.trim()) {
            alert("Please enter a valid target link.");
            return;
        }

        if (qty < minQty || qty > maxQty) {
            alert(`Quantity must be between ${minQty} and ${maxQty}.`);
            return;
        }

        const data = await callSmmWizPost({
            action: "add",
            service: serviceId,
            link,
            quantity: parseInt(qty, 10)
        });

        console.log('🎯 Followiz Order Placement Result:', data);

        if (data.order) {
            const apiOrderId = data.order;
            await processSmsOrder(uId, uBalance, cost, `Boost: ${selectedService.name}`, 'boost', apiOrderId, link);
            updateBoostStatusPanel("Boost order submitted", `Order ID: ${apiOrderId}. Checking status in real time...`);

            pollingStarted = true;
            const pollIntervalMs = 5000;
            const maxAttempts = 24; // ~2 minutes
            let attempt = 0;

            const poller = setInterval(async () => {
                attempt += 1;

                try {
                    const statusData = await callSmmWizGet({
                        action: "status",
                        order: apiOrderId
                    });

                    console.log('🔄 Followiz Status Poll Result:', statusData);

                    if (!statusData || statusData.error) {
                        updateBoostStatusPanel("Status check failed", statusData?.error || "Unable to read order status.");
                        clearInterval(poller);
                        btn.disabled = false;
                        btn.innerHTML = "Place Boost Order";
                        btn.style.opacity = "1";
                        return;
                    }

                    const currentStatus = statusData.status || "Unknown";
                    const detail = `Charge: ${statusData.charge || 'N/A'} · Remains: ${statusData.remains || 'N/A'}`;
                    updateBoostStatusPanel(`Status: ${currentStatus}`, detail);

                    if (currentStatus.toLowerCase() === 'completed' || currentStatus.toLowerCase() === 'cancelled' || currentStatus.toLowerCase() === 'canceled' || currentStatus.toLowerCase() === 'refunded') {
                        clearInterval(poller);
                        updateBoostStatusPanel("Order completed", `Final status: ${currentStatus}. Redirecting to dashboard...`);
                        setTimeout(() => {
                            window.location.href = "dashboard.html";
                        }, 2500);
                    } else if (attempt >= maxAttempts) {
                        clearInterval(poller);
                        updateBoostStatusPanel("Still processing", "The order is still active. Check dashboard for the latest state.");
                        btn.disabled = false;
                        btn.innerHTML = "Place Boost Order";
                        btn.style.opacity = "1";
                    }
                } catch (pollError) {
                    updateBoostStatusPanel("Polling error", pollError.message || "Unable to refresh status.");
                    clearInterval(poller);
                    btn.disabled = false;
                    btn.innerHTML = "Place Boost Order";
                    btn.style.opacity = "1";
                }
            }, pollIntervalMs);

            return;
        } else if (data.error) {
            alert(`Error: ${data.error}`);
        } else {
            alert("Unexpected API response. Please try again.");
        }

    } catch (err) {
        alert("Connection Error");
    } finally {
        if (!pollingStarted) {
            btn.disabled = false;
            btn.innerHTML = "Place Boost Order";
            btn.style.opacity = "1";
        }
    }
};

function updateBoostStatusPanel(status, detail = '') {
    const panel = document.getElementById('boostStatusPanel');
    const message = document.getElementById('boostStatusMessage');
    const detailEl = document.getElementById('boostStatusDetail');

    if (!panel || !message || !detailEl) return;

    panel.classList.remove('hidden');
    message.innerText = status;
    detailEl.innerText = detail;
}

window.placeBoostOrder = window.handleBoostOrder;

// ===================== SMS TAB =====================
let allServices = [];
let countryNamesMap = {}; 
let currentSearch = "";
let currentCountry = "all";
let currentSort = "cheap";

async function initSmsPage() {
    await fetchCountryNames(); 
    await fetchHeroSmsData();
    setupSmsListeners();
}

async function fetchCountryNames() {
    try {
        const data = await callHeroSms({ action: "getCountries" });
        const parsed = typeof data === 'string' ? JSON.parse(data) : data;

        Object.values(parsed).forEach(c => {
            countryNamesMap[c.id] = c.eng;
        });

    } catch (e) { console.error("Map failed"); }
}

async function fetchHeroSmsData() {
    try {
        const raw = await callHeroSms({ action: "getPrices" });
        const data = typeof raw === 'string' ? JSON.parse(raw) : raw;

        allServices = [];

        Object.entries(data).forEach(([countryId, services]) => {
            Object.entries(services).forEach(([serviceCode, details]) => {
                allServices.push({
                    countryId,
                    countryName: countryNamesMap[countryId] || `ID ${countryId}`,
                    serviceCode,
                    cost: details.cost,
                    count: details.count,
                    ...getServiceInfo(serviceCode)
                });
            });
        });

        populateCountryDropdown();
        applySmsFilters(); 

    } catch (err) {
        document.getElementById('smsGrid').innerHTML = `<p class="text-center py-10">API Offline.</p>`;
    }
}

function applySmsFilters() {
    let filtered = [...allServices];
    if (currentSearch) filtered = filtered.filter(item => item.name.toLowerCase().includes(currentSearch) || item.countryName.toLowerCase().includes(currentSearch));
    if (currentCountry !== "all") filtered = filtered.filter(item => item.countryId === currentCountry);
    if (currentSort === "cheap") filtered.sort((a, b) => a.cost - b.cost);
    else filtered.sort((a, b) => b.count - a.count);
    renderSmsGrid(filtered);
}

function renderSmsGrid(items) {
    const grid = document.getElementById('smsGrid');
    if (items.length === 0) {
        grid.innerHTML = `<p class="text-center py-20 text-slate-500 text-xs">No matching numbers.</p>`;
        return;
    }
    grid.innerHTML = items.slice(0, 50).map(item => {
        const basePrice = Math.ceil(item.cost * NGN_RATE * FOLLOWIZ_CONFIG.profitMargin);
        const displayPrice = basePrice + 1500; // Add 1500 naira markup
        return `
        <div class="glass-card p-4 rounded-3xl flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-white/5 rounded-2xl flex items-center justify-center text-blue-400">
                    <i class="${item.icon}"></i>
                </div>
                <div>
                    <h4 class="text-sm font-bold">${item.name}</h4>
                    <p class="text-[10px] text-slate-500">${item.countryName}</p>
                </div>
            </div>
            <div class="text-right flex items-center gap-4">
                <div>
                    <p class="text-sm font-black">₦${displayPrice.toLocaleString()}</p>
                    <p class="text-[9px] text-blue-400">${item.count} left</p>
                </div>
                <button onclick="handlePurchase('${item.serviceCode}', '${item.countryId}', ${item.cost}, '${item.name}')"
                    class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white active:scale-95 transition">
                    +
                </button>
            </div>
        </div>`;
    }).join('');
}

function setupSmsListeners() {
    // Tab switching listeners
    document.getElementById('boostTab').addEventListener('click', () => window.switchService('boost'));
    document.getElementById('smsTab').addEventListener('click', () => window.switchService('sms'));
    
    document.getElementById('smsSearch').addEventListener('input', (e) => {
        currentSearch = e.target.value.toLowerCase();
        applySmsFilters();
    });
    document.getElementById('countryFilter').addEventListener('change', (e) => {
        currentCountry = e.target.value;
        applySmsFilters();
    });
    document.getElementById('sortBtn').onclick = () => {
        currentSort = currentSort === "cheap" ? "popular" : "cheap";
        applySmsFilters();
    };
}

function populateCountryDropdown() {
    const select = document.getElementById('countryFilter');
    const uniqueIds = [...new Set(allServices.map(s => s.countryId))];
    const sorted = uniqueIds.map(id => ({ id, name: countryNamesMap[id] || `ID ${id}` })).sort((a, b) => a.name.localeCompare(b.name));
    select.innerHTML = '<option value="all">🌍 All Countries</option>';
    sorted.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        select.appendChild(opt);
    });
}

window.switchService = (service) => {
    const bTab = document.getElementById('boostTab');
    const sTab = document.getElementById('smsTab');
    const bSec = document.getElementById('boostSection');
    const sSec = document.getElementById('smsSection');
    if (service === 'boost') {
        bTab.classList.add('tab-active'); sTab.classList.remove('tab-active');
        bSec.classList.remove('hidden'); sSec.classList.add('hidden');
    } else {
        sTab.classList.add('tab-active'); bTab.classList.remove('tab-active');
        sSec.classList.remove('hidden'); bSec.classList.add('hidden');
    }
};

// 🔥 FIXED: GETS NUMBER AND ORDER ID BEFORE SAVING TO DB
// 🔥 FIXED: Validates parameters and matches HeroSMS API schema to prevent 400 Errors
window.handlePurchase = async (code, cid, apiCost, sName) => {
    // 1. Safety Check: Ensure code and cid are actually present before calling proxy
    if (!code || cid === undefined || cid === null) {
        return alert("Selection Error: Please select a valid service and country.");
    }

    const basePrice = Math.ceil(apiCost * NGN_RATE * FOLLOWIZ_CONFIG.profitMargin);
    const finalPrice = basePrice + 1500; // Add 1500 naira markup
    
    if (uBalance < finalPrice) {
        return alert("Insufficient Balance. Please top up your wallet.");
    }

    if (confirm(`Confirm: ${sName} for ₦${finalPrice.toLocaleString()}?`)) {
        try {
            // 2. Actually request the number from HeroSMS
            // Ensure parameter names match what the proxy expects
            const response = await callHeroSms({
                action: "getNumber",
                service: code,   // e.g., 'wa'
                country: cid     // e.g., '0' for Russia, '6' for Indonesia, etc.
            });

            // 3. Handle the Plain Text response from HeroSMS
            if (response && response.includes("ACCESS_NUMBER")) {
                const parts = response.split(':');
                const apiOrderId = parts[1];
                const phoneNumber = parts[2];

                // 4. Log to Firestore/Database
                const success = await processSmsOrder(
                    uId, 
                    uBalance, 
                    finalPrice, 
                    sName, 
                    'sms', 
                    apiOrderId, 
                    phoneNumber,
                    code
                );

                if (success) {
                    alert(`Number Generated: ${phoneNumber}`);
                    window.location.href = "history.html"; 
                }
            } else {
                // This captures common API errors like NO_NUMBERS or NO_BALANCE
                alert(`Provider Message: ${response || "Unknown API Error"}`);
            }
        } catch (err) {
            console.error("Purchase Flow Error:", err);
            alert("Order Failed: The server returned an invalid request (400). Please check your API key and balance.");
        }
    }
};

</script>
