<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloutiva | Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .pill-nav { background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.4s ease; }
        .nav-hidden { transform: translate(-50%, 150%); }
        body { background-color: #050507; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .status-cancelled { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body class="font-sans antialiased pb-32">

    <header class="px-6 pt-12 pb-6 max-w-2xl mx-auto w-full flex items-center gap-4">
        <a href="dashboard.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition">
            <i class="fa-solid fa-chevron-left text-sm"></i>
        </a>
        <h1 class="text-3xl font-black tracking-tight">Ledger</h1>
    </header>

    <main class="px-6 max-w-2xl mx-auto w-full">
        <div class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="filterHistory('all')" id="filter-all" class="filter-btn bg-gradient-to-r from-blue-600 to-purple-600 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap">All Time</button>
            <button onclick="filterHistory('topup')" id="filter-topup" class="filter-btn bg-white/5 border border-white/5 px-5 py-2 rounded-full text-xs font-bold text-slate-400 whitespace-nowrap">Top-ups</button>
            <button onclick="filterHistory('order')" id="filter-order" class="filter-btn bg-white/5 border border-white/5 px-5 py-2 rounded-full text-xs font-bold text-slate-400 whitespace-nowrap">Service Orders</button>
        </div>

        <div id="historyList" class="space-y-4">
            <div class="text-center py-10 text-slate-500 animate-pulse text-sm font-bold uppercase tracking-widest">Synchronizing Ledger...</div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 z-[200] hidden flex items-end justify-center">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeDetail()"></div>
        <div class="glass-card w-full max-w-2xl rounded-t-[3rem] p-8 relative z-10 transform translate-y-0 transition-transform">
            <div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
            
            <div class="text-center mb-8">
                <div id="modalIconBox" class="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4">
                    <i id="modalIcon" class="text-3xl"></i>
                </div>
                <h3 id="modalTitle" class="text-2xl font-black">Transaction</h3>
                <p id="modalStatus" class="text-[10px] uppercase font-bold tracking-[0.2em] mt-2"></p>
            </div>

            <div class="space-y-4 mb-8">
                <div class="flex justify-between items-center py-3 border-b border-white/5">
                    <span class="text-slate-500 text-sm">Amount</span>
                    <span id="modalAmount" class="font-bold text-lg"></span>
                </div>
                <div class="flex justify-between items-center py-3 border-b border-white/5">
                    <span class="text-slate-500 text-sm">Reference</span>
                    <span id="modalRef" class="font-mono text-xs text-slate-300"></span>
                </div>
                <div class="flex justify-between items-center py-3 border-b border-white/5">
                    <span class="text-slate-500 text-sm">Date & Time</span>
                    <span id="modalDate" class="text-sm font-semibold"></span>
                </div>
                <div id="explorerRow" class="flex justify-between items-center py-3 border-b border-white/5 hidden">
                    <span class="text-slate-500 text-sm">On-Chain Proof</span>
                    <a id="explorerLink" href="#" target="_blank" class="text-blue-400 text-xs font-bold flex items-center gap-1">
                        View on Explorer <i class="fa-solid fa-external-link text-[10px]"></i>
                    </a>
                </div>
                <div class="flex justify-between items-center py-3">
                    <span class="text-slate-500 text-sm">Payment Method</span>
                    <span id="modalMethod" class="text-sm font-semibold uppercase text-right"></span>
                </div>
            </div>

            <button onclick="closeDetail()" class="w-full py-4 bg-white/5 rounded-2xl font-bold text-sm hover:bg-white/10 transition">Close Details</button>
        </div>
    </div>

    <div id="bottomNav" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-[100] pill-nav rounded-full px-4 py-3 flex justify-between items-center shadow-2xl">
        <a href="dashboard.html" class="p-3 text-slate-400 hover:text-white transition-all">
            <i class="fa-solid fa-house text-lg"></i>
        </a>
        <a href="create-order.html" class="p-3 text-slate-400 hover:text-white transition-all">
            <i class="fa-solid fa-plus text-lg"></i>
        </a>
        <a href="profile.html" class="p-3 text-slate-400 hover:text-white transition-all">
            <i class="fa-solid fa-circle-user text-lg"></i>
        </a>
    </div>

   <script type="module">
    import { protectPage, db, callHeroSms, callSmmWizGet } from './auth-guard.js';
    import { collection, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let allTransactions = [];
    let currentUserId = "";

    protectPage((userData) => {
        currentUserId = userData.uid;
        const historyRef = collection(db, "users", userData.uid, "history");
        const q = query(historyRef, orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            allTransactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // Check for expirations or background updates
            checkExpirations(allTransactions);
            
            renderList(allTransactions.filter(t => t.type !== 'system'));
        });
    });

    async function checkExpirations(transactions) {
        const FIVE_HOURS_MS = 5 * 60 * 60 * 1000;
        const now = Date.now();

        for (const t of transactions) {
            // Auto-cancel very old topups
            if (t.category === 'topup' && t.status === 'pending' && (now - t.timestamp) > FIVE_HOURS_MS) {
                try {
                    await updateDoc(doc(db, "users", currentUserId, "history", t.id), { 
                        status: 'cancelled',
                        note: 'Expired'
                    });
                } catch (e) { console.error(e); }
            }
        }
    }

    function renderList(data) {
        const listContainer = document.getElementById('historyList');
        
        if (data.length === 0) {
            listContainer.innerHTML = `<div class="glass-card rounded-[2.5rem] p-16 flex flex-col items-center justify-center text-center">
                <i class="fa-solid fa-receipt text-slate-600 text-3xl mb-4"></i>
                <h4 class="font-bold text-slate-300">No Activity</h4>
            </div>`;
            return;
        }

        listContainer.innerHTML = data.map(item => `
            <div onclick="window.openDetail('${item.id}')" class="glass-card p-5 rounded-3xl flex justify-between items-center group hover:border-white/20 transition cursor-pointer mb-3">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 ${item.status === 'cancelled' ? 'bg-red-500/10 text-red-500' : item.category === 'topup' ? 'bg-green-500/10 text-green-500' : 'bg-blue-500/10 text-blue-400'} rounded-2xl flex items-center justify-center">
                        <i class="fa-solid ${item.status === 'cancelled' ? 'fa-xmark' : item.category === 'topup' ? 'fa-arrow-down-left' : (item.category === 'sms' ? 'fa-mobile-screen' : 'fa-rocket')}"></i>
                    </div>
                    <div>
                        <h5 class="text-sm font-bold">${item.title}</h5>
                        <p class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">${new Date(item.timestamp).toLocaleDateString()}</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-sm font-black ${item.status === 'cancelled' ? 'text-slate-500 line-through' : item.category === 'topup' ? 'text-green-400' : 'text-white'}">
                        ${item.category === 'topup' ? '+' : '-'}₦${item.amount.toLocaleString()}
                    </p>
                    <p class="text-[9px] font-bold uppercase tracking-widest ${item.status === 'completed' || item.status === 'success' ? 'text-green-500' : item.status === 'cancelled' ? 'text-red-500' : 'text-yellow-500'}">
                        ${item.status}
                    </p>
                </div>
            </div>
        `).join('');
    }

    window.filterHistory = (filter) => {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.className = "filter-btn bg-white/5 border border-white/5 px-5 py-2 rounded-full text-xs font-bold text-slate-400 whitespace-nowrap";
        });
        document.getElementById(`filter-${filter}`).className = "filter-btn bg-gradient-to-r from-blue-600 to-purple-600 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap text-white";

        if (filter === 'all') renderList(allTransactions.filter(t => t.type !== 'system'));
        else if (filter === 'order') renderList(allTransactions.filter(t => t.category === 'sms' || t.category === 'boost'));
        else renderList(allTransactions.filter(t => t.category === filter));
    };

    window.openDetail = async (id) => {
        const data = allTransactions.find(t => t.id === id);
        if(!data) return;

        // Reset Modal UI
        document.getElementById('modalTitle').innerText = data.title;
        document.getElementById('modalAmount').innerText = `₦${data.amount.toLocaleString()}`;
        document.getElementById('modalRef').innerText = data.id.toUpperCase();
        document.getElementById('modalDate').innerText = new Date(data.timestamp).toLocaleString();
        
        const statusEl = document.getElementById('modalStatus');
        statusEl.innerText = data.status;
        statusEl.className = `text-[10px] uppercase font-bold tracking-[0.2em] mt-2 ${data.status === 'completed' || data.status === 'success' ? 'text-green-500' : data.status === 'cancelled' ? 'text-red-500' : 'text-yellow-500'}`;

        // Dynamic Order Data (The "Tabs/Extra Info" you requested)
        const methodRow = document.getElementById('modalMethod');
        const explorerRow = document.getElementById('explorerRow');
        
        // Clear previous dynamic content
        const existingDynamic = document.getElementById('dynamicOrderInfo');
        if(existingDynamic) existingDynamic.remove();

        // Check if this is an SMS or Boost order to show specific tracking tabs
        if (data.category === 'sms' || data.category === 'boost') {
            const dynamicDiv = document.createElement('div');
            dynamicDiv.id = 'dynamicOrderInfo';
            dynamicDiv.className = "mt-6 p-5 bg-white/5 rounded-3xl border border-white/10 space-y-3";
            
            if (data.category === 'sms') {
                dynamicDiv.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500 text-[10px] uppercase font-bold">Phone Number</span>
                        <span class="font-mono text-blue-400 font-bold">${data.phoneNumber || 'Allocating...'}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500 text-[10px] uppercase font-bold">OTP Code</span>
                        <span class="text-lg font-black tracking-widest text-white">${data.otpCode || '<span class="animate-pulse text-slate-600 text-xs">WAITING...</span>'}</span>
                    </div>
                `;
            } else {
                dynamicDiv.innerHTML = `
                    <div class="flex flex-col gap-2">
                        <span class="text-slate-500 text-[10px] uppercase font-bold">Target Link</span>
                        <span class="text-xs text-blue-400 break-all font-mono">${data.link || data.targetUrl || 'N/A'}</span>
                    </div>
                `;
            }
            document.querySelector('#detailModal .space-y-4').appendChild(dynamicDiv);
        }

        // Standard Topup Explorer Logic
        if (data.txHash) {
            explorerRow.classList.remove('hidden');
            const baseUrl = data.method?.includes('ERC20') ? 'https://etherscan.io/tx/' : 'https://bscscan.com/tx/';
            document.getElementById('explorerLink').href = baseUrl + data.txHash;
        } else {
            explorerRow.classList.add('hidden');
        }

        document.getElementById('detailModal').classList.remove('hidden');
    };

    window.closeDetail = () => {
        document.getElementById('detailModal').classList.add('hidden');
    };
</script>

</body>
</html>
